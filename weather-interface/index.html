<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contrôle fictif de la météo - Rennes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Contrôle fictif de la météo - Rennes</h1>
    <div id="current-weather">
        <p>Chargement de la météo...</p>
    </div>
    <h2>Définir une météo désirée</h2>
    <form id="weather-form">
        <label for="desired-weather">Météo souhaitée :</label>
        <input type="text" id="desired-weather" name="desired-weather" placeholder="Ex : ensoleillé">
        <button type="submit">Appliquer</button>
    </form>
    <p class="note">Cette interface est fictive : il est impossible de contrôler la météo réelle.</p>
    <script src="script.js"></script>
</body>
</html>
